name: ABRG Debug (Official Repo Test)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout official repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # ✅ ★ここを追加（重要）
      - name: Install abrg
        run: |
          npm install -g @digital-go-jp/abr-geocoder@2.2.1

      - name: Check package version (local)
        run: |
          echo "=== package.json ==="
          cat package.json

          echo "=== npm ls (global) ==="
          npm ls -g @digital-go-jp/abr-geocoder || true

      # ✅ npx → abrg に変更
      - name: Run CLI version
        run: |
          abrg --version

      - name: Show Public IP
        run: |
          echo "=== Public IP ==="
          curl ifconfig.me
          echo ""

      - name: Run download (DEBUG)
        run: |
          set -o pipefail
          abrg download --debug 2>&1 | tee debug.log

      - name: Extract URLs
        run: |
          echo "=== Extract URLs ==="
          grep -Eo 'https?://[^ ]+' debug.log | sort -u | tee urls.txt

      - name: Curl check
        run: |
          mkdir -p curl-test

          i=0
          while read url; do
            i=$((i+1))
            echo "===== Checking $url ====="

            curl -v -L "$url" -o "curl-test/out_$i.bin" 2> "curl-test/log_$i.txt" || true

            echo "--- file type ---"
            file "curl-test/out_$i.bin" || true

            echo "--- head (100 bytes) ---"
            head -c 100 "curl-test/out_$i.bin" || true
            echo ""
          done < urls.txt

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: abrg-investigation
          path: |
            debug.log
            urls.txt
            curl-test
